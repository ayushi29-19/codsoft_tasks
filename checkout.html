<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | ShopSphere</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>



<!-- Navbar -->

<header class="navbar">


<h1 class="logo">
Shop<span>Sphere</span>
</h1>



<nav>

<a href="index.html">
Home
</a>


<a href="products.html">
Products
</a>


<a href="cart.html">
Cart 🛒
</a>


<button id="theme-toggle">
🌙
</button>


</nav>


</header>






<!-- Checkout Section -->


<section class="checkout-page">


<h2>
Checkout
</h2>




<div class="checkout-box">



<form id="checkout-form">



<label>
Full Name
</label>


<input 
type="text"
id="name"
placeholder="Enter your name"
required
>




<label>
Email Address
</label>


<input 
type="email"
id="email"
placeholder="Enter your email"
required
>




<label>
Phone Number
</label>


<input 
type="tel"
id="phone"
placeholder="Enter phone number"
required
>




<label>
Delivery Address
</label>


<textarea 
id="address"
placeholder="Enter your address"
required>
</textarea>






<label>
Payment Method
</label>



<select id="payment">


<option>
Cash On Delivery
</option>


<option>
UPI Payment
</option>


<option>
Credit / Debit Card
</option>


</select>





<button type="submit" class="btn">

Place Order

</button>



</form>





<div class="checkout-summary">


<h3>
Order Summary
</h3>


<p>
Total Amount:
₹
<span id="checkout-total">
0
</span>
</p>


</div>



</div>



</section>







<footer>

<p>
© 2026 ShopSphere. All Rights Reserved.
</p>

</footer>






<script src="js/checkout.js"></script>

<script src="js/cart.js"></script>

<script src="js/theme.js"></script>


</body>

</html>
